<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ray's Workspace</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: #0f0f1a;
                color: #e0e0e0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 60px 20px;
            }
            h1 {
                font-size: 2rem;
                font-weight: 600;
                color: #ffffff;
                margin-bottom: 8px;
            }
            .subtitle {
                color: #888;
                margin-bottom: 48px;
                font-size: 0.95rem;
            }
            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 20px;
                width: 100%;
                max-width: 800px;
            }
            .card {
                background: #1a1a2e;
                border: 1px solid #2a2a4a;
                border-radius: 12px;
                padding: 28px 24px;
                text-decoration: none;
                color: inherit;
                transition: all 0.2s;
                display: flex;
                flex-direction: column;
                gap: 6px;
            }
            .card:hover {
                background: #22223a;
                border-color: #4a4a8a;
                transform: translateY(-2px);
            }
            .card-name {
                font-size: 1.1rem;
                font-weight: 600;
                color: #fff;
            }
            .card-desc {
                font-size: 0.85rem;
                color: #999;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .loading {
                color: #666;
                font-size: 0.95rem;
                grid-column: 1 / -1;
                text-align: center;
                padding: 40px 0;
            }
            .error-msg {
                color: #aa5555;
                grid-column: 1 / -1;
                text-align: center;
                padding: 20px 0;
                font-size: 0.9rem;
            }
            @media (prefers-color-scheme: light) {
                body {
                    background: #f5f5fa;
                    color: #333;
                }
                h1 {
                    color: #111;
                }
                .subtitle {
                    color: #888;
                }
                .card {
                    background: #fff;
                    border-color: #ddd;
                }
                .card:hover {
                    background: #f0f0f8;
                    border-color: #8888cc;
                }
                .card-name {
                    color: #222;
                }
            }
        </style>
    </head>
    <body>
        <h1>Ray's Workspace</h1>
        <p class="subtitle">Projects &amp; experiments</p>
        <div class="grid" id="project-grid">
            <div class="loading">🔍 Scanning for projects…</div>
        </div>

        <script>
            // Fallback list — shown if GitHub API fails
            const FALLBACK = [
                { name: 'bdgame', title: '单挑 · 修仙格斗' },
                { name: 'codelinez', title: '坨子游戏 (CodeLinez)' },
                { name: 'raid', title: 'Raid Simulator' },
            ];

            const SKIP_DIRS = new Set(['.git', 'node_modules', 'assets', 'static', 'cgi-bin']);

            async function fetchJSON(url) {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res.json();
            }

            async function getProjectTitle(dirName) {
                try {
                    const res = await fetch(dirName + '/index.html');
                    if (!res.ok) return null;
                    const html = await res.text();
                    const m = html.match(/<title>([^<]*)<\/title>/i);
                    return m ? m[1].trim() : null;
                } catch {
                    return null;
                }
            }

            async function discoverProjects() {
                const grid = document.getElementById('project-grid');

                try {
                    const items = await fetchJSON(
                        'https://api.github.com/repos/HDNRAY/HDNRAY.github.io/contents/'
                    );
                    const dirs = items.filter(
                        (item) => item.type === 'dir' && !SKIP_DIRS.has(item.name)
                    );

                    if (dirs.length === 0) throw new Error('no dirs found');

                    // Try to fetch each dir's <title> — done in parallel
                    const titles = await Promise.all(
                        dirs.map((d) => getProjectTitle(d.name))
                    );

                    const projects = dirs.map((d, i) => ({
                        name: d.name,
                        title: titles[i] || d.name,
                    }));

                    renderProjects(projects);
                } catch {
                    renderProjects(FALLBACK);
                }
            }

            function renderProjects(projects) {
                const grid = document.getElementById('project-grid');
                grid.innerHTML = projects
                    .map(
                        (p) => `
                    <a class="card" href="${p.name}/">
                        <span class="card-name">${p.title}</span>
                        <span class="card-desc">/${p.name}</span>
                    </a>
                `
                    )
                    .join('');
            }

            discoverProjects();
        </script>
    </body>
</html>
